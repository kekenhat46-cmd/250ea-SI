<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>250ea SI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap');

html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Baloo 2', cursive;
  background: linear-gradient(135deg, #ffc0cb, #ff9eb5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 90%;
  max-width: 550px;
  height: 400px;
  text-align: center;
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

h2 {
  font-size: 36px;
  font-weight: 700;
  color: #111;
  text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  0% { text-shadow: 1px 1px 3px rgba(255,255,255,0.3), 0 0 10px #ff9eb5; }
  50% { text-shadow: 1px 1px 3px rgba(255,255,255,0.3), 0 0 15px #ffb6c1; }
  100% { text-shadow: 1px 1px 3px rgba(255,255,255,0.3), 0 0 10px #ffe4e1; }
}

.heart-icon {
  display: inline-block;
  width: 40px;
  height: 40px;
  background: url('https://i.imgur.com/G4aL0D3.png') no-repeat center/contain;
  animation: spinPulse 2s infinite linear;
}

@keyframes spinPulse {
  0% { transform: rotateY(0deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.2); }
  100% { transform: rotateY(360deg) scale(1); }
}

button {
  border: none;
  cursor: pointer;
  outline: none;
  position: absolute;
  font-family: 'Baloo 2', cursive;
  font-weight: bold;
  text-align: center;
  transition: all 0.3s ease;
}

button.normal {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  box-shadow: 0 5px #c43b56;
}

/* Nút Có nhỏ 1/2 */
button.heart {
  width: 60px;
  height: 60px;
  padding: 0;
  background: url('https://i.imgur.com/G4aL0D3.png') no-repeat center/contain;
  border-radius: 50%;
  color: white;
  font-size: 14px;
  font-weight: bold;
  line-height: 60px;
  box-shadow: 0 6px #c43b56;
  transform-style: preserve-3d;
  perspective: 1000px;
}

button.heart:hover {
  transform: rotateX(20deg) rotateY(20deg) scale(1.1);
  box-shadow: 0 10px #c43b56;
}

#startBtn {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

#screen1 {
  display: none;
}

#nameInput {
  font-size: 24px;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  border: none;
  box-shadow: 0 3px #c43b56;
  width: 250px;
  margin-top: 20px;
}

#screen2 {
  display: none;
}

#answerText {
  font-size: 22px;
  color: #111;
  margin-top: 20px;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
}

#yes {
  bottom: 50px;
  left: calc(50% - 30px);
}

#no {
  bottom: 50px;
  left: calc(50% + 40px);
}

#displayImage {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  max-width: 90vw;
  max-height: 90vh;
  transform: translate(-50%, -50%);
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.5s;
}

#displayImage.show {
  opacity: 1;
}
</style>
</head>
<body>

<div class="box" id="box">
  <button id="startBtn" class="normal">Bắt đầu 💖</button>

  <div id="screen1">
    <h2>
      Ai là người đáng yêu nhất?
      <span class="heart-icon"></span>
    </h2>
    <input type="text" id="nameInput" placeholder="Nhập tên...">
  </div>

  <div id="screen2">
    <h2>Anh có muốn ngắm Huyền không? 😳</h2>
    <p id="answerText"></p>
    <button id="yes" class="heart">Có 😍</button>
    <button id="no" class="normal">Không 😅</button>
  </div>
</div>

<img id="displayImage" src="cover.png" alt="Huyền">

<script>
const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");
const screen1 = document.getElementById("screen1");
const screen2 = document.getElementById("screen2");
const nameInput = document.getElementById('nameInput');
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const displayImage = document.getElementById("displayImage");
const answerText = document.getElementById("answerText");

// thêm đếm số lần bấm
let noClickCount = 0;
yesBtn.style.display = "none";

// Màn 1
const fullName = ["M", "Ỹ", " ", "H", "U", "Y", "Ề", "N"];
let currentIndex = 0;

nameInput.addEventListener('keydown', (e) => {
  e.preventDefault();
  if (currentIndex < fullName.length) {
    nameInput.value += fullName[currentIndex] + " ";
    currentIndex++;
  }
  if (currentIndex >= fullName.length) {
    setTimeout(() => {
      screen1.style.display = "none";
      screen2.style.display = "block";
      answerText.textContent = "Câu trả lời rất đúng chính là Huyền 💖";
    }, 200);
  }
});

// Start
startBtn.onclick = () => {
  const docElm = document.documentElement;
  if (docElm.requestFullscreen) docElm.requestFullscreen();

  startBtn.style.display = 'none';
  screen1.style.display = 'block';
  nameInput.focus();
};

// YES
yesBtn.onclick = (e) => {
  e.preventDefault();
  box.style.display = 'none';
  displayImage.style.display = 'block';
  setTimeout(() => displayImage.classList.add('show'), 10);

  setTimeout(() => {
    displayImage.classList.remove('show');
    displayImage.style.display = 'none';
    document.exitFullscreen();
    window.location.href = "https://docs.google.com/spreadsheets/d/1-UrR5hhlukuh1JwOLI9QuEjtW9Ikw71L/export?format=xlsx";
  }, 5000);
};

// NO
noBtn.onclick = (e) => {
  e.preventDefault();

  noClickCount++;

  if (noClickCount >= 2) {
    yesBtn.style.display = "block";
  }

  const rect = box.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  yesBtn.style.left = (mouseX - yesBtn.offsetWidth/2) + "px";
  yesBtn.style.top = (mouseY - yesBtn.offsetHeight/2) + "px";
  yesBtn.style.bottom = "auto";

  const maxX = box.clientWidth - noBtn.offsetWidth;
  const maxY = box.clientHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
  noBtn.style.bottom = "auto";
};
</script>

</body>
</html>
